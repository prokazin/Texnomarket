<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi - Техно Маркет</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Техно Маркет</div>
            <ul class="nav-links">
                <li><a href="../index.html"><span class="nav-icon">🏠</span> Главная</a></li>
                <li><a href="apple.html"><span class="nav-icon">🍎</span> Apple</a></li>
                <li><a href="xiaomi.html" class="active"><span class="nav-icon">📱</span> Xiaomi</a></li>
                <li><a href="google.html"><span class="nav-icon">🔍</span> Google</a></li>
            </ul>
            <div class="burger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="category-header">
            <div class="brand-icon">📱</div>
            <h1>Xiaomi</h1>
            <p>Инновационные технологии по доступным ценам</p>
        </section>

        <section class="products-section">
            <div class="filter-bar">
                <select id="sort-products">
                    <option value="default">Сортировка</option>
                    <option value="price-asc">По возрастанию цены</option>
                    <option value="price-desc">По убыванию цены</option>
                    <option value="name">По названию</option>
                </select>
            </div>
            <div class="products-grid" id="xiaomi-products">
                <!-- Товары загружаются через JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Техно Маркет. Все права защищены.</p>
        <p>Связь: @techno_market_bot</p>
    </footer>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-grid">
                <div class="modal-image">
                    <img id="modal-image" src="" alt="">
                </div>
                <div class="modal-details">
                    <span class="category-badge" id="modal-category"></span>
                    <h2 id="modal-name"></h2>
                    <div class="modal-price" id="modal-price"></div>
                    <div class="modal-specs" id="modal-specs"></div>
                    <div class="modal-actions">
                        <button class="btn-buy" onclick="closeModal()">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
